<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <filter id="sk" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014" numOctaves="2" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- ink background -->
  <rect width="1280" height="640" fill="#0c0b09"/>

  <!-- hand-drawn frame -->
  <rect x="40" y="40" width="1200" height="560" rx="18" fill="none" stroke="#3a3a36" stroke-width="2" filter="url(#sk)"/>

  <!-- γ monogram -->
  <g transform="translate(150,140) scale(4.4)" fill="none" stroke="#f3f1ea" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#sk)">
    <path d="M45 24 L45 64 C45 76 56 82 68 76"/>
    <path d="M45 24 C39 13 31 16 37 26"/>
  </g>

  <!-- wordmark -->
  <text x="600" y="296" font-family="Georgia, 'Times New Roman', serif" font-size="96" font-weight="500" fill="#f3f1ea">Fundemetal</text>
  <text x="604" y="352" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="32" fill="#8d8a80">Deep-level methodological AI skill tools</text>

  <!-- hand-drawn divider -->
  <path d="M604 392 C 740 380, 880 404, 1010 390" fill="none" stroke="#f3f1ea" stroke-width="3" filter="url(#sk)"/>

  <!-- footer tag -->
  <text x="604" y="448" font-family="'Courier New', monospace" font-size="22" letter-spacing="2" fill="#6f6e66">THREE COGNITIVE PROTOCOLS · ONE DISCIPLINE · MIT</text>
</svg>
