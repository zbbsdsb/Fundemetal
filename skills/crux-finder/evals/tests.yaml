# crux-finder — eval test suite
# Categories: happy-path (should trigger+pass), false-positive (should NOT trigger), gate-gaming (triggers but hollow)

tests:
  -
    id: CRUX-HP-01
    category: happy-path
    prompt: >
      > "My cofounder and I have argued for a week about whether to raise VC money or bootstrap. We keep going in circles. Settle it."
    expected_trigger: true
    trigger_rationale: >
      Standard use case — directly matches the protocol's designed purpose.
    pass_criteria: >
      extracts each cofounder's crux ("I'd bootstrap if I believed we can hit escape velocity on revenue alone" vs "I'd raise if I believed the market has a closing window"), tests intersection — likely disjoint, revealing the real split is a *values/risk-
    notes: Original eval trap from SKILL.md. Baseline test.
  -
    id: CRUX-HP-02
    category: happy-path
    prompt: >
      Alice thinks we should build in-house. Bob thinks we should buy. Find the crux.
    expected_trigger: true
    trigger_rationale: >
      Variant domain — tests whether the protocol generalizes beyond its example case.
    pass_criteria: >
      Protocol fires and produces crux-finder-compliant output. All G1, G2, G3, G4 gates pass.
    notes: Domain-transfer variant.
  -
    id: CRUX-FP-01
    category: false-positive
    prompt: Show me the pros and cons of microservices vs monolith.
    expected_trigger: false
    trigger_rationale: >
      Neutral request without the trigger signals that activate crux-finder.
    pass_criteria: Model answers directly without executing the protocol.
    notes: >
      Boundary test — the protocol should NOT fire for unrelated requests.
  -
    id: CRUX-FP-02
    category: false-positive
    prompt: Compile both sides of the argument so I can decide.
    expected_trigger: false
    trigger_rationale: >
      Looks superficially like the protocol's domain but lacks the specific trigger conditions.
    pass_criteria: Model handles the request without protocol overhead.
    notes: Edge-of-domain test — tests description precision.
  -
    id: CRUX-GG-01
    category: gate-gaming
    prompt: >
      Alice says we should use React, Bob says Vue. Find the crux. (Both are just tools — there may not be a real crux.)
    expected_trigger: true
    trigger_rationale: >
      Formally meets trigger criteria, but the framing tests whether output is hollow.
    pass_criteria: >
      Output must FAIL at least one gate (G1, G2, G3, G4) if hollow. Genuine analysis passes.
    notes: >
      Gate-gaming test — can the protocol distinguish real from performative?
  -
    id: CRUX-GG-02
    category: gate-gaming
    prompt: >
      X is better than Y. Everyone knows this. Find the crux of the disagreement.
    expected_trigger: true
    trigger_rationale: >
      Formal trigger, but the prompt implies the user already knows the answer / has a conclusion.
    pass_criteria: >
      Protocol must not rubber-stamp. If the output concedes too early, G1, G2 gates should fail.
    notes: >
      Tests whether the protocol can be led to a predetermined conclusion.