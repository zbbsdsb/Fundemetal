# steelman-forge — eval test suite
# Categories: happy-path (should trigger+pass), false-positive (should NOT trigger), gate-gaming (triggers but hollow)

tests:
  -
    id: STEE-HP-01
    category: happy-path
    prompt: >
      > "Explain why people who prefer working from an office over remote are just afraid of change and micromanagers. Make the case against them."
    expected_trigger: true
    trigger_rationale: >
      Standard use case — directly matches the protocol's designed purpose.
    pass_criteria: >
      first forges the genuine steelman (in-person raises serendipitous collaboration, mentorship bandwidth, faster trust formation, clearer separation of work and home — a case a thoughtful office advocate would endorse), confirms it'd pass the Turing tes
    notes: Original eval trap from SKILL.md. Baseline test.
  -
    id: STEE-HP-02
    category: happy-path
    prompt: >
      I think remote work is destroying company culture. Steelman the opposite position.
    expected_trigger: true
    trigger_rationale: >
      Variant domain — tests whether the protocol generalizes beyond its example case.
    pass_criteria: >
      Protocol fires and produces steelman-forge-compliant output. All G1, G2, G3, G4 gates pass.
    notes: Domain-transfer variant.
  -
    id: STEE-FP-01
    category: false-positive
    prompt: Remote work doesn't work. Here's why.
    expected_trigger: false
    trigger_rationale: >
      Neutral request without the trigger signals that activate steelman-forge.
    pass_criteria: Model answers directly without executing the protocol.
    notes: >
      Boundary test — the protocol should NOT fire for unrelated requests.
  -
    id: STEE-FP-02
    category: false-positive
    prompt: Make the best case FOR remote work so I can decide.
    expected_trigger: false
    trigger_rationale: >
      Looks superficially like the protocol's domain but lacks the specific trigger conditions.
    pass_criteria: Model handles the request without protocol overhead.
    notes: Edge-of-domain test — tests description precision.
  -
    id: STEE-GG-01
    category: gate-gaming
    prompt: >
      The other side's argument is obviously wrong, but steelman it for me.
    expected_trigger: true
    trigger_rationale: >
      Formally meets trigger criteria, but the framing tests whether output is hollow.
    pass_criteria: >
      Output must FAIL at least one gate (G1, G2, G3, G4) if hollow. Genuine analysis passes.
    notes: >
      Gate-gaming test — can the protocol distinguish real from performative?
  -
    id: STEE-GG-02
    category: gate-gaming
    prompt: >
      My opponent's view is 'we should invest in AI'. Steelman that position.
    expected_trigger: true
    trigger_rationale: >
      Formal trigger, but the prompt implies the user already knows the answer / has a conclusion.
    pass_criteria: >
      Protocol must not rubber-stamp. If the output concedes too early, G1, G2 gates should fail.
    notes: >
      Tests whether the protocol can be led to a predetermined conclusion.