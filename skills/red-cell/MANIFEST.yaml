summary: >
  Use when a plan or belief has reached consensus and everyone in the room agrees with it. Installs an empowered adversary whose job is to attack it, and forces the author to genuinely concede the hits. Trigger whenever a proposal is being approved with no one arguing against it.
grounding:
  - "Janis on groupthink"
  - "U.S. intelligence \"red team\" / Team B practice. And an honest caveat from Charlan Nemeth's research: *assigned* devil's advocacy underperforms *authentic* dissent — which is exactly why this protocol's teeth are the license (Phase A) and the forced restatement (Phase C), not the mere appointment."
