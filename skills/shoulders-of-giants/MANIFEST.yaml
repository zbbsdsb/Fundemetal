tagline: Reuse code as a sovereignty decision
summary: >
  An architect-grade protocol for reusing existing code. It treats dependency
  selection as a sovereignty decision, not a search task: draw the sovereignty
  map first, define the problem shape, then prospect, due-diligence, choose a
  reuse depth, and run a systems review. Six stages, five hard gates.
