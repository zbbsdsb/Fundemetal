  - Wardley Mapping (evolution axis)
  - Domain-Driven Design (subdomains, anti-corruption layer)
  - Hyrum's Law
  - Lindy effect
  - Software supply-chain security
gate: >
  sovereignty declaration must come first; conceptual fit is a veto axis; every
  reference/encapsulate decision needs a one-sentence escape plan; the final
  deliverable must include a decision table plus at least one rejected candidate.
