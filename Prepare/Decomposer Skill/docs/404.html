<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — DECOMPOSER</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --white: #FFFFFF; --black: #000000; --gray-50: #666666; --font: 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif; }
  body { font-family: var(--font); background: var(--white); color: var(--black); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px; }
  .wrap { max-width: 480px; text-align: center; }
  .code { font-size: 96px; font-weight: 700; letter-spacing: -4px; line-height: 1; margin-bottom: 16px; }
  .rule { width: 40px; height: 1px; background: var(--gray-50); margin: 24px auto; }
  .msg { font-size: 16px; color: var(--gray-50); line-height: 1.6; margin-bottom: 32px; }
  a { display: inline-block; border: 1px solid var(--black); padding: 10px 24px; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; color: var(--black); transition: all 0.2s; }
  a:hover { background: var(--black); color: var(--white); }
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="rule"></div>
  <p class="msg">This page has not survived the decomposition. The protocol found no path from here to there.</p>
  <a href="/">RETURN TO KNOWN-KNOWN</a>
</div>
</body>
</html>
